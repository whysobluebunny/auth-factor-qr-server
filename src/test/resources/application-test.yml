spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

app:
  auth-factor:
    service-id: auth-factor-qr-test
    otp-period: 30s
    otp-digits: 6
    allowed-clock-skew-steps: 1
    challenge-ttl: 2m
    challenge-rate-limit-window: 1m
    challenge-rate-limit-requests: 5
    response-max-age: 2m
    verify-rate-limit-window: 1m
    verify-rate-limit-requests: 3
    max-verify-attempts: 3
    auth-session-retention: 10m
    auth-session-cleanup-interval: 1h
    master-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    api-key-header-name: X-Auth-Factor-Api-Key
    api-key: test-api-key
