spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

app:
  auth-factor:
    service-id: auth-factor-qr-test
    otp-period: 30s
    otp-digits: 6
    allowed-clock-skew-steps: 1
    challenge-ttl: 2m
    response-max-age: 2m
    max-verify-attempts: 3
    master-key-base64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
