server:
  port: 8080

spring:
  application:
    name: auth-factor-qr-server

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_factor_qr
    username: auth_factor_qr
    password: auth_factor_qr

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  auth-factor:
    service-id: auth-factor-qr-demo
    otp-period: 30s
    otp-digits: 6
    allowed-clock-skew-steps: 1
    challenge-ttl: 2m
    challenge-rate-limit-window: 1m
    challenge-rate-limit-requests: 5
    response-max-age: 2m
    verify-rate-limit-window: 1m
    verify-rate-limit-requests: 10
    max-verify-attempts: 5
    auth-session-retention: 7d
    auth-session-cleanup-interval: 15m
    master-key-base64: ${AUTH_FACTOR_MASTER_KEY_BASE64:REPLACE_WITH_32_BYTE_BASE64_KEY}
    api-key-header-name: X-Auth-Factor-Api-Key
    api-key: ${AUTH_FACTOR_API_KEY:REPLACE_WITH_API_KEY}
